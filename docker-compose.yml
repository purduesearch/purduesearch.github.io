version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: club-pm-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: clubpm
      POSTGRES_PASSWORD: clubpm_dev
      POSTGRES_DB: club_pm
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clubpm -d club_pm"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
